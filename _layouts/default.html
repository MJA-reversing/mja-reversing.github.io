<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>

  <!-- Correct CSS linking for home page and nested blog posts -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

  <div class="site-header">
    <h1><a href="{{ '/' | relative_url }}">My Blog</a></h1>
  </div>

  <div class="post-container">
    <article>
      <h1>{{ page.title }}</h1>

      <!-- Date and optional author -->
      <p class="post-meta">
        {{ page.date | date: "%B %d, %Y" }}
        {% if page.author %}
          &nbsp;•&nbsp;by {{ page.author }}
        {% endif %}
      </p>

      <div class="post-content">
        {{ content }}
      </div>
    </article>
  </div>

  <div class="site-footer">
    <p>&copy; {{ site.time | date: "%Y" }} My Blog</p>
  </div>

</body>
</html>
