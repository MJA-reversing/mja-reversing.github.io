<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>

  <!-- CSS fix: absolute path ensures posts use the same styling -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

  <!-- Optional site header include -->
  <header class="site-header">
    <h1><a href="{{ '/' | relative_url }}">My Blog</a></h1>
  </header>

  <!-- Post container -->
  <div class="post-container">
    <article>
      <h1>{{ page.title }}</h1>
      <p class="post-meta">
        {{ page.date | date: "%B %d, %Y" }}
        {% if page.author %}
          &nbsp;•&nbsp;by {{ page.author }}
        {% endif %}
      </p>
      <div class="post-content">
        {{ content }}
      </div>
    </article>
  </div>

  <!-- Optional footer -->
  <footer class="site-footer">
    <p>&copy; {{ site.time | date: "%Y" }} My Blog</p>
  </footer>

</body>
</html>
