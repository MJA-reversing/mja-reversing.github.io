---
layout: default
---

<div class="post-container">
  <article>
    <h1>{{ page.title }}</h1>

    <!-- Date and optional author -->
    <p class="post-meta">
      {{ page.date | date: "%B %d, %Y" }}
      {% if page.author %}
        &nbsp;•&nbsp;by {{ page.author }}
      {% endif %}
    </p>

    <div class="post-content">
      {{ content }}
    </div>
  </article>
</div>
